stages:
    - prepare
    - lint
    - typecheck
    - test
    - build
    - scans
    - release

variables:
  POETRY_VERSION: "2.1.3"
  PYTHON_VERSIONS: "3.9 3.10 3.11 3.12 3.13"
  VENV_PATH: "$CI_PROJECT_DIR/.venv"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  POETRY_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pypoetry"

default:
    image: python:${PYTHON_VERSION}
    cache:
        key:
            files:
                - poetry.lock
        paths:
            - .cache/pip
            - .cache/pypoetry
            - .venv
            - poetry.lock
        policy: pull-push
    before_script:
        - python -m venv "$VENV_PATH"
        - source "$VENV_PATH/bin/activate"
        - pip install --upgrade pip
        - pip install "poetry==$POETRY_VERSION"
        - poetry install --no-interaction --no-root --with dev


# GitLab built-in security scanners
include:
    - template: Security/Dependency-Scanning.gitlab-ci.yml
    - template: Security/SAST.gitlab-ci.yml
    - template: Security/DAST.gitlab-ci.yml

prepare:
    stage: prepare
    script:
        - echo "Environment prepared with Poetry and dependencies installed."
    rules:
        - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

lint:
    stage: lint
    script:
        - make lint
    allow_failure: true
    rules:
        - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

typecheck:
    stage: typecheck
    script:
        - make typecheck
    allow_failure: true
    rules:
        - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

pytest:
    image: "python:${PYTHON_VERSION}"
    parallel:
        matrix:
            - PYTHON_VERSION: "3.9"
            - PYTHON_VERSION: "3.10"
            - PYTHON_VERSION: "3.11"
            - PYTHON_VERSION: "3.12"
    stage: test
    script:
        - make test
        - make coverage
    artifacts:
        when: always
        paths:
            - coverage.xml
        reports:
            coverage_report:
                coverage_format: cobertura
                path: coverage.xml
    rules:
        - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

build:
    stage: build
    image: python:3.12
    script:
        - make build
    artifacts:
        paths:
            - dist/
    rules:
        - if: $CI_COMMIT_BRANCH && $CI_PIPELINE_SOURCE == "push"

gitleaks:
    stage: scans
    image:
        name: zricethezav/gitleaks
        entrypoint: [""]
    script: gitleaks detect --verbose --source . -f json -r gitleaks.json
    allow_failure: true
    artifacts:
        when: always
        reports:
            codequality: gitleaks.json
        paths:
            - gitleaks.json


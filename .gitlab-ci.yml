upload_reports:
    stage: scans
    image: python:3.12
    needs: ["gitleaks"]
    when: always
    script:
        - pip install requests
        - make report


sca_pip_audit:
    stage: scans
    image: python:${PYTHON_VERSION}
    script:
        - pip install pip-audit
        - pip-audit -r pyproject.toml -f json -o pip-audit.json
    artifacts:
        when: always
        paths:
        - pip-audit.json
    allow_failure: true
    rules:
        - if: $CI_PIPELINE_SOURCE == "push" || $CI_PIPELINE_SOURCE == "merge_request_event"

# GitLab SAST runs automatically from template
sast:
      stage: scans

# GitLab DAST runs automatically from template
dast:
    stage: scans
    variables:
        DAST_WEBSITE: "https://example.com"  # set your staging URL
    rules:
        - if: $CI_COMMIT_BRANCH == "main"

release:
    stage: release
    script:
        - poetry build
        # Add your publishing logic here (PyPI, GitLab Package Registry, etc.)
        # Example for PyPI:
        # - poetry publish --username "$PYPI_USER" --password "$PYPI_PASS"
    artifacts:
        paths:
          - dist/
    rules:
        - if: $CI_COMMIT_TAG
